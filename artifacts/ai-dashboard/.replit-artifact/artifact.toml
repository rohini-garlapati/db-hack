kind = "web"
previewPath = "/"
title = "AI Dashboard"
version = "1.0.0"
id = "artifacts/ai-dashboard"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20060

[services.development]
run = "pnpm --filter @workspace/ai-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-dashboard", "run", "build" ]
serve = "static"
publicDir = "artifacts/ai-dashboard/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20060"
BASE_PATH = "/"
